databases:
  - name: codepodium-db
    plan: free
    databaseName: codepodium
    user: codepodium

services:
  - type: web
    name: codepodium-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codepodium-db
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000

  - type: web
    name: codepodium-frontend
    runtime: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://codepodium.onrender.com/api
