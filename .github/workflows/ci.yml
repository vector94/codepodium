name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/CodePodium.UnitTests/CodePodium.UnitTests.csproj --no-build --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test tests/CodePodium.IntegrationTests/CodePodium.IntegrationTests.csproj --no-build --configuration Release --verbosity normal
